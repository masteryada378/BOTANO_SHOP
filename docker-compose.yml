# version: "3.9"

services:
    backend:
        build: ./backend
        ports:
            - "5005:5005"
        volumes:
            - ./backend:/app
        environment:
            - PORT=5005
            - DB_HOST=db
            - DB_USER=user
            - DB_PASSWORD=password
            - DB_NAME=spor_shop
            - JWT_SECRET=botano_dev_secret_change_in_production
            - JWT_EXPIRES_IN=7d
        # --- Task #4: Wait for DB to be healthy ---
        depends_on:
            db:
                condition: service_healthy
        # ------------------------------------------
        networks:
            - botano_network
    frontend:
        build: ./frontend
        platform: linux/amd64
        ports:
            - "5173:5173"
        volumes:
            - ./frontend:/app
            - /app/node_modules # Запобігає перезапису з хоста
        environment:
            - NODE_ENV=development
        networks:
            - botano_network
    db:
        image: mysql:8.0
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: spor_shop
            MYSQL_USER: user
            MYSQL_PASSWORD: password
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - botano_network
        # --- Task #3: Healthcheck implementation ---
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-p$${MYSQL_ROOT_PASSWORD}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        # -------------------------------------------
volumes:
    mysql_data:
networks:
    botano_network:
        driver: bridge
